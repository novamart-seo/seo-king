name: SEO King Automation

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'    # Every 30 min      — new product checker (pollAndFix)
    - cron: '0 21 * * *'      # 2:00 AM PKT daily — seo patterns
    - cron: '30 21 * * *'     # 2:30 AM PKT daily — technical seo
    - cron: '0 22 * * 3'      # 3:00 AM PKT Wed   — collection seo (run 1)
    - cron: '0 22 * * 6'      # 3:00 AM PKT Sat   — collection seo (run 2)
    - cron: '30 22 * * *'     # 3:30 AM PKT daily — broken links
    - cron: '0 23 * * *'      # 4:00 AM PKT daily — redirect manager

env:
  GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
  GEMINI_API_KEY_2:       ${{ secrets.GEMINI_API_KEY_2 }}
  GEMINI_API_KEY_3:       ${{ secrets.GEMINI_API_KEY_3 }}
  GEMINI_API_KEY_4:       ${{ secrets.GEMINI_API_KEY_4 }}
  GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
  GROQ_API_KEY_2:         ${{ secrets.GROQ_API_KEY_2 }}
  GROQ_API_KEY_3:         ${{ secrets.GROQ_API_KEY_3 }}
  GROQ_API_KEY_4:         ${{ secrets.GROQ_API_KEY_4 }}
  OPENROUTER_API_KEY:     ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_API_KEY_2:   ${{ secrets.OPENROUTER_API_KEY_2 }}
  OPENROUTER_API_KEY_3:   ${{ secrets.OPENROUTER_API_KEY_3 }}
  OPENROUTER_API_KEY_4:   ${{ secrets.OPENROUTER_API_KEY_4 }}
  SHOPIFY_STORE_URL:      ${{ secrets.SHOPIFY_STORE_URL }}
  SHOPIFY_ACCESS_TOKEN:   ${{ secrets.SHOPIFY_ACCESS_TOKEN }}


jobs:

  # ── Every 30 min: Poll & instantly fix new products ────────────────────────
  new-product-check:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node pollAndFix.js
      - name: Upload SEO reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: new-product-reports-${{ github.run_id }}
          path: seo-reports/
          retention-days: 30

  # ── Daily 2:00 AM PKT: SEO Patterns (stops when all products optimized) ────
  seo-patterns:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 21 * * *')
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run SEO Patterns
        run: node seoPatterns.js
      - name: Save progress
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-patterns-progress-${{ github.run_id }}
          path: |
            progress.json
            api-manager-calls.json
          retention-days: 7

  # ── Daily 2:30 AM PKT: Technical SEO (images — WebP + alt text) ───────────
  technical-seo:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '30 21 * * *')
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Technical SEO
        run: node technicalSEO.js
      - name: Save progress
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: technical-seo-progress-${{ github.run_id }}
          path: |
            techseo-progress.json
            api-manager-calls.json
          retention-days: 7

  # ── Wednesday 3:00 AM PKT: Collection SEO (run 1 of 2) ────────────────────
  collection-seo-wed:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 22 * * 3'
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Collection SEO
        run: node collectionSEO.js
      - name: Save progress
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-seo-wed-progress-${{ github.run_id }}
          path: collection-progress.json
          retention-days: 7

  # ── Saturday 3:00 AM PKT: Collection SEO (run 2 of 2) ─────────────────────
  collection-seo-sat:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 22 * * 6'
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Collection SEO
        run: node collectionSEO.js
      - name: Save progress
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-seo-sat-progress-${{ github.run_id }}
          path: collection-progress.json
          retention-days: 7

  # ── Daily 3:30 AM PKT: Broken links ───────────────────────────────────────
  broken-links:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '30 22 * * *'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node brokenLinks.js

  # ── Daily 4:00 AM PKT: Redirect manager ───────────────────────────────────
  seo-redirects:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 23 * * *'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node redirectManager.js